shared:
  - key: agents.context_dir
    required: true
    default: .agents/context
  - key: agents.config_dir
    required: true
    default: .agents/config

skill:
  - key: green_threshold
    required: false
    default: 85
  - key: yellow_threshold
    required: false
    default: 60
  - key: baseline_mode
    required: false
    default: optional
  - key: issue_tracker
    required: false
    default: auto
  - key: max_resolution_loops
    required: false
    default: 2
  - key: freshness_hours
    required: false
    default: 24
  - key: explore_code_max_files
    required: false
    default: 20
  - key: max_history_rows
    required: false
    default: 20
  - key: penalty_challenged
    required: false
    default: 10
  - key: penalty_unresolved
    required: false
    default: 10
  - key: penalty_contradiction
    required: false
    default: 15
  - key: penalty_ambiguity
    required: false
    default: 5
  - key: penalty_inconclusive
    required: false
    default: 5

requires_setup: true
