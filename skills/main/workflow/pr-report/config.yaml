# Config declaration for pr-report

# Shared keys are resolved once per workspace and stored in .agents/config/shared.yaml.
shared:
  - key: agents.context_dir
    required: true
    default: .agents/context
  - key: agents.config_dir
    required: true
    default: .agents/config

# Skill-specific keys are stored in .agents/config/pr-report.yaml.
skill:
  - key: pr-report.tools.pr.provider
    required: true
    default: auto
    description: Preferred PR source. `auto` detects the best available tool; `github` uses GitHub MCP or CLI; `manual` asks the user.

  - key: pr-report.tools.pr.repo
    required: false
    default: null
    description: Default owner/repo for PR lookups. If null, detect from git remote.

  - key: pr-report.tools.pr.endpoint
    required: false
    default: null
    description: Optional direct API endpoint for PR metadata. Only used when the provider is set to `direct` and the user has confirmed the endpoint.

  - key: pr-report.tools.ci.provider
    required: false
    default: auto
    description: Preferred CI/build source. `auto` detects; `github-actions` uses GitHub MCP or CLI; `none` skips CI.

  - key: pr-report.tools.ci.endpoint
    required: false
    default: null
    description: Optional direct API endpoint for CI/build status. Only used when the provider is set to `direct` and the user has confirmed the endpoint.

  - key: pr-report.tools.static_analysis.provider
    required: false
    default: auto
    description: Preferred static-analysis source. `auto` detects; `sonarcloud` uses SonarCloud API/MCP; `none` skips.

  - key: pr-report.tools.static_analysis.endpoint
    required: false
    default: null
    description: Optional direct API endpoint for static-analysis findings. Only used when the provider is set to `direct` and the user has confirmed the endpoint.

  - key: pr-report.tools.issue_tracker.provider
    required: false
    default: auto
    description: Preferred issue-tracker source. `auto` detects; `jira` uses Jira API/MCP; `none` skips.

  - key: pr-report.tools.issue_tracker.endpoint
    required: false
    default: null
    description: Optional direct API endpoint for issue tracker scope. Only used when the provider is set to `direct` and the user has confirmed the endpoint.

  - key: pr-report.tooling.preference
    required: false
    default: auto
    description: Tool selection strategy. `auto` selects best available; `mcp` prefers MCP tools; `cli` prefers native binaries; `manual` always asks.

  - key: pr-report.tooling.degraded_mode
    required: false
    default: ask
    description: Behavior when only a degraded source is available. `ask` prompts; `accept` proceeds; `reject` skips.

  - key: pr-report.bots
    required: false
    default: {}
    description: Bot/human reviewer username mappings and default source types/severities.

  - key: pr-report.scope_mode
    required: false
    default: lenient
    description: How aggressively to flag scope drift. `strict` flags items not explicitly in acceptance criteria; `lenient` only flags clearly unrelated items.

  - key: pr-report.task_list.enabled
    required: false
    default: true
    description: Whether to include a generated task list at the end of the report.

requires_setup: true
