# Go ecosystem starter config.
# Copy to .agents/config/verify-branch.yaml and adjust as needed.

preferences:
  fail_fast: false
  max_concurrent_gates: 1
  report_template: default
  include_uncommitted: true
  default_branch: null
  base_ref: null
  adapter_paths: []

  gates:
    test:
      enabled: auto
      importance: required
      type: command
      fail_fast: false
      detect_commands:
        - source: go.mod
      commands:
        - name: "go test"
          command: "go test ./..."
          cwd: "."
          timeout: 300
          env: {}
          importance: required
          run_when:
            - "**/*.go"

    spec-coverage:
      enabled: false
      importance: optional
      type: mapper
      fail_fast: false
      default_mappings: []
      mappings: []
      exemptions: []

    standards:
      enabled: auto
      importance: required
      type: standards
      fail_fast: false
      sources: []
      ai_inference:
        enabled: false
        source_paths: []
        edit_before_use: true
      overrides: []

    dead-code:
      enabled: auto
      importance: optional
      type: custom
      adapter: null
      fallback_adapters: []
      command: "go vet ./..."
      cwd: "."
      timeout: 300

    style:
      enabled: auto
      importance: optional
      type: custom
      adapter: null
      fallback_adapters: []
      command: "gofmt -l ."
      cwd: "."
      timeout: 300

notes:
  - text: "Go starter config."
    category: decision
