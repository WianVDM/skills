# Java ecosystem starter config (Maven / Gradle).
# Copy to .agents/config/verify-branch.yaml and adjust as needed.

preferences:
  fail_fast: false
  max_concurrent_gates: 1
  report_template: default
  include_uncommitted: true
  default_branch: null
  base_ref: null
  adapter_paths: []

  gates:
    test:
      enabled: auto
      importance: required
      type: command
      fail_fast: false
      detect_commands:
        - source: pom.xml
        - source: build.gradle
        - source: build.gradle.kts
      commands:
        - name: "Maven tests"
          command: "mvn test"
          cwd: "."
          timeout: 600
          env: {}
          importance: required
          run_when:
            - "src/**/*.java"
            - "pom.xml"

    spec-coverage:
      enabled: false
      importance: optional
      type: mapper
      fail_fast: false
      default_mappings: []
      mappings: []
      exemptions: []

    standards:
      enabled: auto
      importance: required
      type: standards
      fail_fast: false
      sources: []
      ai_inference:
        enabled: false
        source_paths: []
        edit_before_use: true
      overrides: []

    style:
      enabled: auto
      importance: optional
      type: custom
      adapter: null
      fallback_adapters: []
      command: "mvn checkstyle:check"
      cwd: "."
      timeout: 300

notes:
  - text: "Java starter config. Uses Maven by default; switch to Gradle if needed."
    category: decision
