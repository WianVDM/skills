# Documentation / Markdown ecosystem starter config.
# Copy to .agents/config/verify-branch.yaml and adjust as needed.

preferences:
  fail_fast: false
  max_concurrent_gates: 1
  report_template: default
  include_uncommitted: true
  default_branch: null
  base_ref: null
  adapter_paths: []

  gates:
    prose:
      enabled: auto
      importance: optional
      type: custom
      adapter: null
      fallback_adapters: []
      command: "vale ."
      cwd: "."
      timeout: 300

    links:
      enabled: auto
      importance: optional
      type: custom
      adapter: null
      fallback_adapters: []
      command: "lychee --no-progress docs/"
      cwd: "."
      timeout: 300

    standards:
      enabled: auto
      importance: required
      type: standards
      fail_fast: false
      sources: []
      ai_inference:
        enabled: false
        source_paths: []
        edit_before_use: true
      overrides: []

notes:
  - text: "Documentation starter config. Uses Vale for prose and lychee for link checking."
    category: decision
