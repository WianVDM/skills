# Mobile ecosystem starter config (Flutter / React Native / native).
# Copy to .agents/config/verify-branch.yaml and adjust as needed.

preferences:
  fail_fast: false
  max_concurrent_gates: 1
  report_template: default
  include_uncommitted: true
  default_branch: null
  base_ref: null
  adapter_paths: []

  gates:
    test:
      enabled: auto
      importance: required
      type: command
      fail_fast: false
      detect_commands:
        - source: package.json:scripts
          priority: ["test:ci", "test"]
        - source: pubspec.yaml
        - source: fastlane/Fastfile
      commands:
        - name: "Mobile tests"
          command: "PLACEHOLDER_TEST_COMMAND"
          cwd: "."
          timeout: 300
          env: {}
          importance: required
          run_when:
            - "**/*"

    spec-coverage:
      enabled: auto
      importance: optional
      type: mapper
      fail_fast: false
      default_mappings: []
      mappings: []
      exemptions: []

    standards:
      enabled: auto
      importance: required
      type: standards
      fail_fast: false
      sources: []
      ai_inference:
        enabled: false
        source_paths: []
        edit_before_use: true
      overrides: []

notes:
  - text: "Mobile starter config. Replace the test command with your project-specific command (e.g., flutter test, jest, xcodebuild)."
    category: decision
