name: Generate skill catalog and capability index

on:
  pull_request:
    paths:
      - 'skills/**'
      - 'skills.json'
      - 'scripts/generate-skill-catalog.py'
      - 'skills/blocks/authoring/index-skill-capabilities/scripts/index-skill-capabilities.py'
      - '.github/workflows/generate-skill-catalog.yml'
  push:
    branches:
      - main
    paths:
      - 'skills/**'
      - 'skills.json'
      - 'scripts/generate-skill-catalog.py'
      - 'skills/blocks/authoring/index-skill-capabilities/scripts/index-skill-capabilities.py'
      - '.github/workflows/generate-skill-catalog.yml'

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install PyYAML
        run: pip install pyyaml

      - name: Generate skill catalog
        run: python scripts/generate-skill-catalog.py

      - name: Generate capability index
        run: python skills/blocks/authoring/index-skill-capabilities/scripts/index-skill-capabilities.py --output docs/skill-capability-index.json

      - name: Check for catalog and index changes
        id: diff
        run: |
          if git diff --quiet -- docs/skill-catalog.md docs/skill-capability-index.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Fail on PR if catalog or index is stale
        if: github.event_name == 'pull_request' && steps.diff.outputs.changed == 'true'
        run: |
          echo "::error::docs/skill-catalog.md or docs/skill-capability-index.json is out of date. Run the generation scripts and commit the changes."
          git diff -- docs/skill-catalog.md docs/skill-capability-index.json
          exit 1

      - name: Commit updated catalog and index on main
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/skill-catalog.md docs/skill-capability-index.json
          git commit -m "chore: regenerate skill catalog and capability index"
          git push
